    <!-- Critical CSS inline OTIMIZADO -->
    <style>
      /* Reset e base otimizado */
      *,*::before,*::after{box-sizing:border-box}
      html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
      body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background-color:#FAFAFA;line-height:1.5;color:#1f2937;font-display:swap}
      
      /* Loading spinner crítico */
      .loading-spinner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border:3px solid #f3f3f3;border-top:3px solid #0131FF;border-radius:50%;animation:spin 1s linear infinite;z-index:9999}
      @keyframes spin{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}
      .loaded .loading-spinner{display:none}
      
      /* Otimização crítica de imagens */
      img{max-width:100%;height:auto;display:block;font-style:italic;background-repeat:no-repeat;background-size:cover}
      
      /* Hero image LCP otimizada */
      .hero-image{width:100%;height:auto;aspect-ratio:4/3;object-fit:cover;background-color:#f3f4f6}
      @media (min-width:768px){.hero-image{aspect-ratio:16/10}}
      
      /* Navbar crítico */
      .navbar{position:fixed;top:0;left:0;right:0;z-index:50;pointer-events:none}
      .navbar-content{pointer-events:auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border:1px solid rgba(229,231,235,0.5);border-radius:9999px;box-shadow:0 10px 25px -5px rgba(0,0,0,0.1)}
      
      /* Hero section crítico */
      .hero-section{position:relative;overflow:hidden;padding-top:5rem;padding-bottom:3rem}
      .hero-bg{position:absolute;inset:0;background:#0131FF;border-radius:0 0 2rem 2rem}
      @media (min-width:768px){.hero-bg{border-radius:0 0 3rem 3rem}}
      
      /* Dark mode crítico */
      .dark{color-scheme:dark}
      .dark body{background-color:#111827;color:#f9fafb}
      .dark .hero-bg{background:#374151}
      
      /* Contenção de layout */
      .contain-layout{contain:layout}
      .contain-paint{contain:paint}
      .contain-size{contain:size}
      
      /* Otimização de focus */
      :focus-visible{outline:2px solid #0131FF;outline-offset:2px}
      
      /* Prevenção de FOUC */
      .section{opacity:0;animation:fadeIn 0.3s ease-out forwards}
      @keyframes fadeIn{to{opacity:1}}
      
      /* Redução de motion */
      @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important;scroll-behavior:auto!important}}
    </style>

    <!-- Em dev: remove service workers antigos que causam tela branca -->
    <script type="module">
      if (import.meta.env.DEV && 'serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map((r) => r.unregister()));
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((k) => caches.delete(k)));
        }
      }
    </script>
