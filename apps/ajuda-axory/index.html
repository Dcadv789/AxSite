<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="https://img.axory.com.br/insecure/rs:fit:1440:1080/q:95/plain/https://storage.axory.com.br/imagens-saas-sites/sobre_n%C3%B3s_2_s9jrbh%20(1).svg@webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Central de Ajuda — Axory</title>
    <meta name="description" content="Tutoriais, guias e respostas para usar os produtos Axory." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 antialiased">
    <div id="root"></div>

    <!-- Em dev: remove service workers antigos que causam tela branca -->
    <script type="module">
      if (import.meta.env.DEV && 'serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map((r) => r.unregister()));
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((k) => caches.delete(k)));
        }
      }
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
